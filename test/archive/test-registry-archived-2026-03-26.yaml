# Test Registry
# This file maintains a registry of all test files with their IDs, metadata, and relationships
# Format: TE-TST-[SEQUENCE] for Test File IDs
# Updated: 2026-03-25
# Version: 2.4
#
# VALIDATION: Run doc/process-framework/scripts/validation/Validate-TestTracking.ps1 to validate consistency
# between this registry, test-tracking.md, and actual test files
#
# SCHEMA NOTES:
# - crossCuttingFeatures: Optional list of additional feature IDs tested by this file
#   (beyond the primary featureId). Used for tests that validate cross-feature interactions.
# - testType: Unit | Integration | Parser | Performance | cross-cutting
#   cross-cutting type indicates the test explicitly validates multi-feature interactions.
# - priority: Critical | Standard | Extended
#   Critical = must pass before any release (core functionality, foundation features)
#   Standard = normal test coverage, expected to pass (default for new entries)
#   Extended = edge cases, performance, stress tests (not release-blocking)
# - status: NOT stored here. Test implementation status lives in
#   test/state-tracking/permanent/test-tracking.md (single source of truth).
#
# CONSOLIDATION NOTE (v2.1): Feature IDs updated from 42-feature to 9-feature scope.
# Mapping: 0.1.2(Data Models)/0.1.5(Path Utils)→0.1.1, 0.1.3(DB)→0.1.2, 0.1.4(Config)→0.1.3,
