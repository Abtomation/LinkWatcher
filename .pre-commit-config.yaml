repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      # E2E acceptance test trees under test/e2e-acceptance-testing/ are sample-project
      # *fixtures* that must byte-match what each case's run.ps1 generates (often
      # intentionally non-PEP8). File-modifying hooks must skip them or they corrupt the
      # fixtures and re-break the E2E cases (PD-BUG-111). Mirrors the flake8 exclusion below.
      - id: trailing-whitespace
        exclude: ^test/e2e-acceptance-testing/
      - id: end-of-file-fixer
        exclude: ^test/e2e-acceptance-testing/
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: debug-statements

  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=100]
        # See note above — E2E fixtures must not be reformatted (PD-BUG-111).
        exclude: ^test/e2e-acceptance-testing/

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]
        # See note above — E2E fixtures must not be reformatted (PD-BUG-111).
        exclude: ^test/e2e-acceptance-testing/

  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=120, --extend-ignore=E203]
        # E2E acceptance test trees under test/e2e-acceptance-testing/ are sample-project
        # *fixtures* that LinkWatcher parses as data, not source to lint — linting them would
        # force edits that alter fixture content and the behavior the E2E cases verify.
        exclude: ^test/e2e-acceptance-testing/

  - repo: local
    hooks:
      - id: pytest-quick
        name: pytest-quick
        entry: pwsh.exe -ExecutionPolicy Bypass -File process-framework/scripts/test/Run-Tests.ps1 -Quick
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
      - id: no-git-objects-literal
        name: Detect .git/objects/ literal paths (corruption guard, PF-IMP-615)
        entry: pwsh.exe -ExecutionPolicy Bypass -File process-framework/scripts/validation/Check-GitObjectsLiteral.ps1
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
