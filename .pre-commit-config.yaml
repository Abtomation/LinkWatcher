repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: debug-statements

  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=100]

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=120, --extend-ignore=E203]

  - repo: local
    hooks:
      - id: pytest-quick
        name: pytest-quick
        entry: pwsh.exe -ExecutionPolicy Bypass -File process-framework/scripts/test/Run-Tests.ps1 -Quick
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
      - id: no-git-objects-literal
        name: Detect .git/objects/ literal paths (corruption guard, PF-IMP-615)
        entry: pwsh.exe -ExecutionPolicy Bypass -File process-framework/scripts/validation/Check-GitObjectsLiteral.ps1
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
