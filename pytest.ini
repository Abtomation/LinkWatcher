[tool:pytest]
# Pytest-native configuration for LinkWatcher
# NOTE: Framework wrapper config is in doc/process-framework/languages-config/python-config.json
#       pytest.ini = pytest runtime config (markers, discovery, warnings, timeout)
#       python-config.json = Run-Tests.ps1 wrapper config (CLI flags, coverage args, categories)

# Test discovery
testpaths = test/automated
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options (verbose controlled by Run-Tests.ps1 -VerboseOutput, not here)
addopts =
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    parser: Parser-specific tests
    performance: Performance and scalability tests
    slow: Tests that take longer to run
    manual: Manual test procedures (not run automatically)
    critical: Critical functionality tests (P0 priority)
    high: High priority tests (P1 priority)
    medium: Medium priority tests (P2 priority)
    low: Low priority tests (P3 priority)

# Test filtering
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum version requirements
minversion = 7.0

# Test timeout (in seconds)
timeout = 300

# Coverage settings (when using pytest-cov)
# Run with: pytest --cov=linkwatcher --cov-report=html
